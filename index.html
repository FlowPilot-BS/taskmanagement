<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Task Management</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f5f5f5;
    }

    iframe {
      border: none;
      width: 100%;
      height: 100vh; /* Full screen height on PC */
    }

    /* Optional: make it shorter on mobile */
    @media (max-width: 768px) {
      iframe {
        height: 90vh;
      }
    }
  </style>
</head>

<body>
  <iframe 
    src="https://script.google.com/macros/s/AKfycbyk47ADXSRuX0EOMaP7drpUOeYkt9mODE1McWwvmh_kRUEV53i8F_UGsLl7Fu9sgfs1/exec"
    scrolling="yes"
    allow="geolocation">
  </iframe>
</body>
</html>
